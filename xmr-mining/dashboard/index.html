<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>XMR 矿工仪表盘</title>
<style>
  :root{
    --bg:#0d1117; --panel:#161b22; --border:#30363d; --txt:#e6edf3;
    --muted:#8b949e; --green:#3fb950; --red:#f85149; --accent:#d29922;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--txt);
    font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif}
  header{padding:18px 24px;border-bottom:1px solid var(--border);
    display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
  h1{font-size:18px;margin:0;font-weight:600}
  h1 span{color:var(--accent)}
  .meta{color:var(--muted);font-size:13px}
  .cards{display:flex;gap:14px;flex-wrap:wrap;padding:20px 24px}
  .card{background:var(--panel);border:1px solid var(--border);border-radius:10px;
    padding:14px 18px;min-width:150px;flex:1}
  .card .label{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.04em}
  .card .value{font-size:24px;font-weight:700;margin-top:6px}
  .wrap{padding:0 24px 40px}
  table{width:100%;border-collapse:collapse;background:var(--panel);
    border:1px solid var(--border);border-radius:10px;overflow:hidden}
  th,td{padding:11px 14px;text-align:left;font-size:14px;border-bottom:1px solid var(--border)}
  th{color:var(--muted);font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:.04em}
  tr:last-child td{border-bottom:none}
  td.num{text-align:right;font-variant-numeric:tabular-nums}
  .dot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:7px}
  .on{background:var(--green)} .off{background:var(--red)}
  .status-on{color:var(--green)} .status-off{color:var(--red)}
  .empty{padding:30px;text-align:center;color:var(--muted)}
  .err{background:#2d1418;border:1px solid var(--red);color:#ffb3ae;
    padding:10px 16px;margin:10px 24px;border-radius:8px;font-size:13px;display:none}
  footer{color:var(--muted);font-size:12px;padding:16px 24px;border-top:1px solid var(--border)}
  .install{margin:18px 24px 0;background:var(--panel);border:1px solid var(--border);
    border-radius:10px;padding:14px 18px}
  .install-label{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px}
  .install-row{display:flex;gap:10px;align-items:stretch}
  .install-row code{flex:1;background:#0b0f14;border:1px solid var(--border);border-radius:8px;
    padding:10px 12px;font-size:13px;color:var(--txt);overflow-x:auto;white-space:nowrap;
    font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
  #copyBtn{background:var(--accent);color:#1a1205;border:none;border-radius:8px;
    padding:0 18px;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap}
  #copyBtn:hover{filter:brightness(1.1)}
  #copyBtn.done{background:var(--green);color:#04210d}
  .install-hint{color:var(--muted);font-size:12px;margin-top:8px}
  .install-hint code{background:#0b0f14;padding:1px 5px;border-radius:4px}
</style>
</head>
<body>
  <header>
    <h1>XMR 挖矿 <span>矿工仪表盘</span></h1>
    <div class="meta" id="refreshMeta">连接中…</div>
  </header>

  <div class="err" id="err"></div>

  <div class="install">
    <div class="install-label">子节点一键安装命令（在子节点上以 root 运行）</div>
    <div class="install-row">
      <code id="installCmd">加载中…</code>
      <button id="copyBtn" type="button">复制</button>
    </div>
    <div class="install-hint">不用填节点名：默认自动用 <code>vps-主机名</code>，每台机器名字唯一。想自定义可在末尾加 <code>--worker 名字</code>。<code>--threads max</code> 表示用满所有线程。</div>
  </div>

  <div class="cards">
    <div class="card"><div class="label">总算力</div><div class="value" id="hrTotal">—</div></div>
    <div class="card"><div class="label">在线节点</div><div class="value" id="online">—</div></div>
    <div class="card"><div class="label">有效份额</div><div class="value" id="accepted">—</div></div>
    <div class="card"><div class="label">拒绝份额</div><div class="value" id="rejected">—</div></div>
    <div class="card"><div class="label">连接矿机数</div><div class="value" id="miners">—</div></div>
  </div>

  <div class="wrap">
    <table>
      <thead>
        <tr>
          <th>状态</th><th>节点名称</th><th>IP 地址</th>
          <th class="num">算力</th><th class="num">有效份额</th>
          <th class="num">拒绝份额</th><th class="num">最近提交</th>
        </tr>
      </thead>
      <tbody id="rows"><tr><td colspan="7" class="empty">加载中…</td></tr></tbody>
    </table>
  </div>

  <footer>每 10 秒自动刷新 · 通过 <code>/api/</code> 读取 XMRig-Proxy 接口</footer>

<script>
const API = '/api';            // nginx reverse-proxies to the proxy (token added server-side)
const REFRESH = 10000;
const ONLINE_WINDOW = 10 * 60 * 1000; // last share within 10 min => online
const HR_WINDOW = 3 * 60 * 1000;      // rolling window for the hashrate estimate

// Stratum miners don't report their hashrate to the proxy, and the proxy's own
// hashrate fields read ~0 for small workers. Derive a real rate from the proxy's
// cumulative per-worker hash counter: Δhashes / Δt over a rolling window.
const hashSamples = {};
function workerHashrate(name, hashes, nowMs){
  let s = hashSamples[name];
  if(!s || hashes < s[s.length-1].h) s = [];   // reset on reconnect / proxy restart
  s.push({t: nowMs, h: hashes});
  while(s.length > 2 && nowMs - s[0].t > HR_WINDOW) s.shift();
  hashSamples[name] = s;
  const first = s[0], last = s[s.length-1];
  const dt = (last.t - first.t) / 1000;
  return dt > 0 ? (last.h - first.h) / dt : 0;
}

function fmtHr(h){
  h = +h || 0;
  if (h >= 1e6) return (h/1e6).toFixed(2)+' MH/s';
  if (h >= 1e3) return (h/1e3).toFixed(2)+' kH/s';
  return h.toFixed(0)+' H/s';
}
// Worker name/IP come from miners that connect to the public proxy, so they are
// untrusted; escape before inserting into HTML to prevent stored XSS.
function esc(v){
  return String(v).replace(/[&<>"']/g, c => (
    {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]
  ));
}
// xmrig-proxy reports the last-share time as a Unix timestamp; normalize
// seconds-vs-milliseconds so the online check works across versions.
function toMs(ts){
  ts = +ts || 0;
  return ts > 0 && ts < 1e12 ? ts * 1000 : ts;
}
function fmtAgo(ts){
  if(!ts) return '—';
  const s = Math.floor((Date.now()-ts)/1000);
  if(s<60) return s+' 秒前';
  if(s<3600) return Math.floor(s/60)+' 分钟前';
  if(s<86400) return Math.floor(s/3600)+' 小时前';
  return Math.floor(s/86400)+' 天前';
}
function showErr(msg){
  const e=document.getElementById('err');
  if(msg){e.textContent=msg;e.style.display='block';}else{e.style.display='none';}
}

async function getJSON(path){
  const r = await fetch(API+path, {cache:'no-store'});
  if(!r.ok) throw new Error(path+' → HTTP '+r.status);
  return r.json();
}

async function tick(){
  // Summary and workers are fetched independently so one failing doesn't blank the other.
  let ok = true;

  try{
    const summary = await getJSON('/1/summary');
    const res = summary.results || {};
    document.getElementById('accepted').textContent = res.accepted ?? '—';
    document.getElementById('rejected').textContent = res.rejected ?? '—';
    const miners = summary.miners || {};
    document.getElementById('miners').textContent =
      (miners.now ?? 0) + (miners.max != null ? ' / ' + miners.max : '');
  }catch(e){ ok = false; }

  try{
    const workers = await getJSON('/1/workers');
    // Each row: [name, ip, conns, accepted, rejected, invalid, hashes, lastHash, hr1, hr2, ...]
    const list = (workers.workers || []);
    const tbody = document.getElementById('rows');
    let onlineCount = 0, totalHr = 0;
    const now = Date.now();
    if(list.length === 0){
      tbody.innerHTML = '<tr><td colspan="7" class="empty">暂无子节点连接。用 install-worker.sh 在子节点上一键安装即可。</td></tr>';
    } else {
      tbody.innerHTML = list.map(w => {
        const name=w[0], ip=w[1], acc=w[3], rej=w[4], lastHash=toMs(w[7]);
        const whr = workerHashrate(name, +w[6] || 0, now);
        const online = lastHash && (now-lastHash) < ONLINE_WINDOW;
        if(online){ onlineCount++; totalHr += whr; }
        return `<tr>
          <td><span class="dot ${online?'on':'off'}"></span><span class="${online?'status-on':'status-off'}">${online?'在线':'离线'}</span></td>
          <td>${name?esc(name):'(未命名)'}</td>
          <td>${ip?esc(ip):'—'}</td>
          <td class="num">${fmtHr(whr)}</td>
          <td class="num">${esc(acc)}</td>
          <td class="num">${esc(rej)}</td>
          <td class="num">${fmtAgo(lastHash)}</td>
        </tr>`;
      }).join('');
    }
    document.getElementById('online').textContent = onlineCount + ' / ' + list.length;
    document.getElementById('hrTotal').textContent = fmtHr(totalHr);
  }catch(e){ ok = false; }

  if(ok){
    showErr('');
    document.getElementById('refreshMeta').textContent = '更新于 ' + new Date().toLocaleTimeString('zh-CN');
  } else {
    showErr('无法连接代理 API（xmrig-proxy 是否正在运行？）');
    document.getElementById('refreshMeta').textContent = '错误';
  }
}

// Build the one-line installer using the host serving this page, so the IP is
// always correct. Workers connect to the proxy on port 3333.
const PROXY_HOST = location.hostname;
const INSTALL_CMD =
  'curl -fsSL https://raw.githubusercontent.com/yjh52110/min/main/xmr-mining/scripts/install-worker.sh'
  + ' | sudo bash -s -- --proxy ' + PROXY_HOST + ':3333 --threads max';
document.getElementById('installCmd').textContent = INSTALL_CMD;

document.getElementById('copyBtn').addEventListener('click', async () => {
  const btn = document.getElementById('copyBtn');
  try{
    if(navigator.clipboard && window.isSecureContext){
      await navigator.clipboard.writeText(INSTALL_CMD);
    } else {
      const ta = document.createElement('textarea');
      ta.value = INSTALL_CMD; ta.style.position='fixed'; ta.style.opacity='0';
      document.body.appendChild(ta); ta.select();
      document.execCommand('copy'); document.body.removeChild(ta);
    }
    btn.textContent = '已复制'; btn.classList.add('done');
    setTimeout(()=>{ btn.textContent='复制'; btn.classList.remove('done'); }, 1800);
  }catch(e){
    btn.textContent = '复制失败';
    setTimeout(()=>{ btn.textContent='复制'; }, 1800);
  }
});

tick();
setInterval(tick, REFRESH);
</script>
</body>
</html>
